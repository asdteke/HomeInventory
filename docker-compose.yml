services:
  homeinventory:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      SITE_URL: ${SITE_URL:-http://localhost:3001}
      JWT_SECRET: ""
      APP_ENCRYPTION_KEY: ""
      APP_ENCRYPTION_KEY_ID: ""
    secrets:
      - jwt_secret
      - app_encryption_key
      - app_encryption_key_id
    volumes:
      # Persistent data (SQLite database)
      - homeinventory_data:/app/data
      # Persistent uploads (photos)
      - homeinventory_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  homeinventory_data:
  homeinventory_uploads:

secrets:
  jwt_secret:
    file: ${HOMEINVENTORY_SECRETS_DIR:-./secrets}/jwt_secret.txt
  app_encryption_key:
    file: ${HOMEINVENTORY_SECRETS_DIR:-./secrets}/app_encryption_key.txt
  app_encryption_key_id:
    file: ${HOMEINVENTORY_SECRETS_DIR:-./secrets}/app_encryption_key_id.txt

# Optional: Add a reverse proxy network
# networks:
#   default:
#     external:
#       name: proxy_network

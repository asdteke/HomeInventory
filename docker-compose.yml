services:
  homeinventory:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      SITE_URL: ${SITE_URL:-http://localhost:3001}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:?APP_ENCRYPTION_KEY is required}
      APP_ENCRYPTION_KEY_ID: ${APP_ENCRYPTION_KEY_ID:-2026-docker}
    volumes:
      # Persistent data (SQLite database)
      - homeinventory_data:/app/data
      # Persistent uploads (photos)
      - homeinventory_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  homeinventory_data:
  homeinventory_uploads:

# Optional: Add a reverse proxy network
# networks:
#   default:
#     external:
#       name: proxy_network
